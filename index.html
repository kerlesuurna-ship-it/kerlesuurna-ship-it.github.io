<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giraffe TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── Background ── */
    #bg {
      position: fixed;
      inset: 0;
      background: url('TV_Wallpaper.jpg') center/cover no-repeat;
      z-index: 0;
    }

    /* ── TV Widget (draggable) ── */
    #tv-widget {
      position: fixed;
      width: 420px;
      cursor: grab;
      z-index: 10;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.55));
      transition: filter 0.3s;
    }
    #tv-widget:active { cursor: grabbing; }
    #tv-widget.powered-off {
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.55)) brightness(0.5) saturate(0.2);
    }

    /* ── Giraffe PNG ── */
    #tv-body {
      width: 100%;
      display: block;
      pointer-events: none;
    }

    /* ── Video screen
         PNG is 511×547.
         Screen rect: x=95,y=258 → x=393,y=390
         left%   = 95/511   = 18.59%
         top%    = 258/547  = 47.17%
         width%  = 298/511  = 58.32%
         height% = 132/547  = 24.13%
         border-radius mirrors the rounded rect in the image
    ── */
    #screen-wrap {
      position: absolute;
      left: 18.59%;
      top: 47.17%;
      width: 58.32%;
      height: 24.13%;
      border-radius: 12%;
      overflow: hidden;
      background: #000;
      pointer-events: none;
    }

    #giraffe-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Black/off overlay on screen */
    #screen-off {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, #111 0%, #000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #screen-off.visible { opacity: 1; }
    #screen-off .power-icon {
      width: 30px;
      height: 30px;
      opacity: 0.25;
    }

    /* ── Button hit areas
         Derived from TV_Layout.svg (viewBox 511×547).
         Button icon centres (approx):
           Rewind  : (161, 422)
           Pause   : (218, 431)
           Play    : (280, 430)
           FF      : (343, 422)
           Power   : (249, 428)
         These map directly as % of widget width/height.
    ── */
    .btn-hit {
      position: absolute;
      cursor: pointer;
      border-radius: 50%;
      pointer-events: auto;
    }
    .btn-hit::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: rgba(255,255,180,0);
      transition: background 0.15s;
    }
    .btn-hit:hover::after  { background: rgba(255,255,180,0.22); }
    .btn-hit:active::after { background: rgba(255,255,180,0.40); }

    /* All button positions as % of the 511×547 SVG viewBox */
    #btn-rw    { left: calc(161px / 511 * 100% - 18px); top: calc(422px / 547 * 100% - 18px); width:36px; height:36px; }
    #btn-pause { left: calc(218px / 511 * 100% - 18px); top: calc(431px / 547 * 100% - 18px); width:36px; height:36px; }
    #btn-play  { left: calc(280px / 511 * 100% - 18px); top: calc(430px / 547 * 100% - 18px); width:36px; height:36px; }
    #btn-ff    { left: calc(343px / 511 * 100% - 18px); top: calc(422px / 547 * 100% - 18px); width:36px; height:36px; }
    #btn-power { left: calc(249px / 511 * 100% - 20px); top: calc(428px / 547 * 100% - 20px); width:40px; height:40px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(10,10,10,0.78);
      color: #fff;
      font-family: Georgia, serif;
      font-size: 13px;
      padding: 8px 20px;
      border-radius: 24px;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 100;
      letter-spacing: 0.05em;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Drag hint ── */
    #hint {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.42);
      color: rgba(255,255,255,0.9);
      font-family: Georgia, serif;
      font-size: 12px;
      padding: 6px 18px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 100;
      backdrop-filter: blur(4px);
      letter-spacing: 0.07em;
      animation: fadeHint 5s ease forwards;
    }
    @keyframes fadeHint {
      0%   { opacity:0; transform: translateX(-50%) translateY(-8px); }
      12%  { opacity:1; transform: translateX(-50%) translateY(0); }
      75%  { opacity:1; }
      100% { opacity:0; }
    }
  </style>
</head>
<body>

  <div id="bg"></div>

  <div id="tv-widget">
    <!-- Giraffe body -->
    <img id="tv-body" src="TV_Taust__1_.png" alt="Giraffe TV" draggable="false" />

    <!-- Video screen sits precisely over the grey rounded rect -->
    <div id="screen-wrap">
      <video id="giraffe-video" src="Giraffe_4k_Video.mp4" loop playsinline preload="auto"></video>
      <div id="screen-off">
        <svg class="power-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
          <path d="M12 2v7"/>
          <path d="M5.93 5.93A9 9 0 1 0 18.07 5.93"/>
        </svg>
      </div>
    </div>

    <!-- Invisible button hit areas (mapped from TV_Layout.svg) -->
    <div class="btn-hit" id="btn-rw"    title="Rewind 10s"></div>
    <div class="btn-hit" id="btn-pause" title="Pause"></div>
    <div class="btn-hit" id="btn-play"  title="Play"></div>
    <div class="btn-hit" id="btn-ff"    title="Fast-forward 10s"></div>
    <div class="btn-hit" id="btn-power" title="Power On / Off"></div>
  </div>

  <div id="toast"></div>
  <div id="hint">🦒 Drag the TV &nbsp;·&nbsp; Use the buttons below to control playback</div>

<script>
  /* ── Elements ── */
  const video    = document.getElementById('giraffe-video');
  const widget   = document.getElementById('tv-widget');
  const screenOff = document.getElementById('screen-off');
  let powered    = false;
  let toastTimer = null;

  /* ── Toast ── */
  function toast(msg, dur = 1500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), dur);
  }

  /* ── Power toggle ── */
  function setPowered(on) {
    powered = on;
    if (on) {
      video.play().catch(() => {});
      screenOff.classList.remove('visible');
      widget.classList.remove('powered-off');
      toast('📺  ON');
    } else {
      video.pause();
      screenOff.classList.add('visible');
      widget.classList.add('powered-off');
      toast('📺  OFF');
    }
  }

  document.getElementById('btn-power').addEventListener('click', e => {
    e.stopPropagation();
    setPowered(!powered);
  });

  document.getElementById('btn-play').addEventListener('click', e => {
    e.stopPropagation();
    if (!powered) { setPowered(true); return; }
    video.play().catch(() => {});
    toast('▶  Play');
  });

  document.getElementById('btn-pause').addEventListener('click', e => {
    e.stopPropagation();
    if (!powered) return;
    video.pause();
    toast('⏸  Pause');
  });

  document.getElementById('btn-rw').addEventListener('click', e => {
    e.stopPropagation();
    if (!powered) return;
    video.currentTime = Math.max(0, video.currentTime - 10);
    toast('⏮  −10s');
  });

  document.getElementById('btn-ff').addEventListener('click', e => {
    e.stopPropagation();
    if (!powered) return;
    video.currentTime = Math.min(video.duration || Infinity, video.currentTime + 10);
    toast('⏭  +10s');
  });

  /* ── Drag ── */
  let dragging = false, ox = 0, oy = 0;

  widget.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('btn-hit')) return;
    dragging = true;
    widget.setPointerCapture(e.pointerId);
    const r = widget.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
    widget.style.transition = 'none';
    widget.style.cursor = 'grabbing';
  });

  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    let x = e.clientX - ox;
    let y = e.clientY - oy;
    x = Math.max(0, Math.min(window.innerWidth  - widget.offsetWidth,  x));
    y = Math.max(0, Math.min(window.innerHeight - widget.offsetHeight, y));
    widget.style.left      = x + 'px';
    widget.style.top       = y + 'px';
    widget.style.transform = 'none';
  });

  window.addEventListener('pointerup', () => {
    dragging = false;
    widget.style.cursor = 'grab';
  });

  /* ── Init: start powered off ── */
  screenOff.classList.add('visible');
  widget.classList.add('powered-off');
</script>
</body>
</html>
