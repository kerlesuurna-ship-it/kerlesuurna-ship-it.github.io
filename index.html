<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TV Widget</title>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    user-select:none;
    font-family:Arial, sans-serif;
}

/* Full wallpaper */
body{
    background:url("TV_Wallpaper.jpg") center center / cover no-repeat;
}

/* Draggable TV */
#tvWidget{
    position:absolute;
    left:120px;
    top:80px;

    width:520px;
    height:auto;

    cursor:grab;
    z-index:10;
}

#tvWidget.dragging{
    cursor:grabbing;
}

/* TV image */
#tvFrame{
    width:100%;
    display:block;
    pointer-events:none;
}

/* Screen position inside giraffe TV */
#screenContainer{
    position:absolute;

    /* Adjust if needed */
    left:18%;
    top:50.8%;

    width:60%;
    height:24.5%;

    overflow:hidden;
    border-radius:28px;

    background:black;
}

/* Video */
#tvVideo{
    width:100%;
    height:100%;
    object-fit:cover;
    background:black;
}

/* Overlay for screen off */
#screenOff{
    position:absolute;
    inset:0;
    background:black;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s;
}

/* Invisible button hit areas */
.control{
    position:absolute;
    z-index:20;
}

/* Power button near head */
#powerBtn{
    top:6%;
    right:8%;
    width:9%;
    height:8%;
    cursor:pointer;
}

/* Green buttons area */
#prevBtn{
    left:32%;
    bottom:17%;
    width:8%;
    height:5%;
    cursor:pointer;
}

#playBtn{
    left:46%;
    bottom:17%;
    width:8%;
    height:5%;
    cursor:pointer;
}

#nextBtn{
    left:60%;
    bottom:17%;
    width:8%;
    height:5%;
    cursor:pointer;
}

/* Optional hover debug */
.control:hover{
    background:rgba(0,255,0,0.12);
}
</style>
</head>
<body>

<div id="tvWidget">

    <!-- Video screen -->
    <div id="screenContainer">

        <video
            id="tvVideo"
            autoplay
            loop
            muted
            playsinline
        >
            <source src="video.mp4" type="video/mp4">
        </video>

        <div id="screenOff"></div>
    </div>

    <!-- TV artwork -->
    <img id="tvFrame" src="TV_Taust.png" alt="TV">

    <!-- Invisible controls -->
    <div id="powerBtn" class="control" title="Power"></div>

    <div id="prevBtn" class="control" title="Previous"></div>
    <div id="playBtn" class="control" title="Play/Pause"></div>
    <div id="nextBtn" class="control" title="Next"></div>

</div>

<script>
const tvWidget = document.getElementById("tvWidget");
const video = document.getElementById("tvVideo");
const screenOff = document.getElementById("screenOff");

let screenEnabled = true;

/* -------------------------
   DRAGGING
------------------------- */

let dragging = false;
let startX = 0;
let startY = 0;
let offsetX = 0;
let offsetY = 0;

tvWidget.addEventListener("pointerdown", (e)=>{

    const clickedControl = e.target.classList.contains("control");

    if(clickedControl) return;

    dragging = true;
    tvWidget.classList.add("dragging");

    startX = e.clientX;
    startY = e.clientY;

    offsetX = tvWidget.offsetLeft;
    offsetY = tvWidget.offsetTop;

    tvWidget.setPointerCapture(e.pointerId);
});

window.addEventListener("pointermove",(e)=>{

    if(!dragging) return;

    tvWidget.style.left =
        offsetX + (e.clientX - startX) + "px";

    tvWidget.style.top =
        offsetY + (e.clientY - startY) + "px";
});

window.addEventListener("pointerup",()=>{

    dragging = false;
    tvWidget.classList.remove("dragging");
});

/* -------------------------
   PLAY / PAUSE
------------------------- */

document
.getElementById("playBtn")
.addEventListener("click",()=>{

    if(video.paused){
        video.play();
    }else{
        video.pause();
    }
});

/* -------------------------
   REWIND
------------------------- */

document
.getElementById("prevBtn")
.addEventListener("click",()=>{

    video.currentTime =
        Math.max(0, video.currentTime - 10);
});

/* -------------------------
   FORWARD
------------------------- */

document
.getElementById("nextBtn")
.addEventListener("click",()=>{

    video.currentTime =
        Math.min(
            video.duration || Infinity,
            video.currentTime + 10
        );
});

/* -------------------------
   POWER BUTTON
------------------------- */

document
.getElementById("powerBtn")
.addEventListener("click",()=>{

    screenEnabled = !screenEnabled;

    if(screenEnabled){

        screenOff.style.opacity = "0";
        video.muted = false;
        video.play();

    }else{

        screenOff.style.opacity = "1";
        video.pause();
    }
});

/* Start muted to satisfy browser autoplay */
video.play().catch(()=>{});
</script>

</body>
</html>
