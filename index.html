<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giraffe TV</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Full-page background ── */
    #bg {
      position: fixed;
      inset: 0;
      background: url('TV_Wallpaper.jpg') center / cover no-repeat;
      z-index: 0;
    }

    /* ══════════════════════════════════════
       WIDGET  —  draggable floating widget
       PNG native size: 511 × 547 px
    ══════════════════════════════════════ */
    #widget {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 430px;
      height: 460px;   /* 430 × (547/511) ≈ 460 */
      z-index: 10;
      user-select: none;
      cursor: grab;
      filter: drop-shadow(0 20px 56px rgba(0,0,0,0.6));
    }
    #widget:active { cursor: grabbing; }

    /* ══════════════════════════════════════
       LAYER STACK  (all position:absolute)
         z=1  #video-layer   ← video + off overlay  (BEHIND skin)
         z=2  #skin          ← transparent PNG frame (ON TOP of video)
         z=3  .btn-hit       ← invisible click zones
         z=4  #status        ← badge
    ══════════════════════════════════════ */

    /* ── Video layer ──
       Screen hole in PNG: px (118,253) → (374,407)  =  256×154 px in 511×547 space
       As % of widget:
         left   = 118/511 = 23.09%
         top    = 253/547 = 46.25%
         width  = 256/511 = 50.10%
         height = 154/547 = 28.15%
    */
    #video-layer {
      position: absolute;
      left:   23.09%;
      top:    46.25%;
      width:  50.10%;
      height: 28.15%;
      z-index: 1;
      background: #000;
      overflow: hidden;
      border-radius: 4px;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Dark "TV off" overlay */
    #screen-off {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, #1a1a2e 0%, #050508 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      transition: opacity 0.4s;
    }
    #screen-off.hidden { opacity: 0; pointer-events: none; }
    #screen-off svg { width: 36%; opacity: 0.3; }

    /* ── Giraffe skin PNG — transparent bg + transparent screen hole ── */
    #skin {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      display: block;
    }

    /* ══════════════════════════════════════
       BUTTON HIT AREAS
       SVG icon centres (511×547 space):
         REWIND  ≈ (161, 422)  → 31.5%, 77.1%
         PAUSE   ≈ (218, 431)  → 42.7%, 78.8%
         POWER   ≈ (249, 429)  → 48.7%, 78.4%
         PLAY    ≈ (281, 431)  → 55.0%, 78.8%
         FFWD    ≈ (343, 422)  → 67.1%, 77.1%
    ══════════════════════════════════════ */
    .btn-hit {
      position: absolute;
      z-index: 3;
      cursor: pointer;
      border-radius: 50%;
      /* debug: background: rgba(255,0,0,0.35); */
    }

    #btn-rewind { left: 26%;   top: 72.5%; width: 10%; height: 9%; }
    #btn-pause  { left: 38%;   top: 74.5%; width: 9%;  height: 9%; }
    #btn-power  { left: 44%;   top: 74.5%; width: 9%;  height: 9%; }
    #btn-play   { left: 50%;   top: 74.5%; width: 9%;  height: 9%; }
    #btn-ffwd   { left: 62%;   top: 72.5%; width: 10%; height: 9%; }

    /* ── Status badge ── */
    #status {
      position: absolute;
      top: 8px;
      right: 14px;
      font-size: 9px;
      font-family: 'Courier New', monospace;
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.55);
      padding: 2px 8px;
      border-radius: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      z-index: 4;
      pointer-events: none;
    }

    /* ══════════════════════════════════════
       BUTTON PRESS RIPPLE
    ══════════════════════════════════════ */
    @keyframes ripple {
      0%   { transform: translate(-50%,-50%) scale(0);   opacity: 0.7; }
      100% { transform: translate(-50%,-50%) scale(3.2); opacity: 0;   }
    }
    .ripple-dot {
      position: absolute;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255, 210, 80, 0.65);
      pointer-events: none;
      animation: ripple 0.44s ease-out forwards;
      z-index: 5;
    }

    /* ══════════════════════════════════════
       TOAST NOTIFICATION
    ══════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8,8,8,0.78);
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      letter-spacing: 0.09em;
      padding: 8px 22px;
      border-radius: 30px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 100;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ══════════════════════════════════════
       DRAG HINT
    ══════════════════════════════════════ */
    #drag-hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.65);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 0.16em;
      pointer-events: none;
      z-index: 50;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9);
      transition: opacity 1.2s;
    }
    #drag-hint.gone { opacity: 0; }
  </style>
</head>
<body>

<div id="bg"></div>
<div id="drag-hint">☞ DRAG THE GIRAFFE</div>
<div id="toast"></div>

<div id="widget">

  <!-- LAYER 1: Video (behind the skin) -->
  <div id="video-layer">
    <video id="video" src="Giraffe_4k_Video__2_.mp4" loop playsinline preload="metadata"></video>
    <div id="screen-off">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 18 V50" stroke="#aaa" stroke-width="7" stroke-linecap="round"/>
        <path d="M33 27 A25 25 0 1 0 67 27" stroke="#aaa" stroke-width="7" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
  </div>

  <!-- LAYER 2: Giraffe PNG skin (transparent bg + screen hole) -->
  <img id="skin" src="TV_Taust.png" alt="" draggable="false" />

  <!-- LAYER 3: Invisible button hit areas -->
  <div id="btn-rewind" class="btn-hit" title="Rewind 10s"></div>
  <div id="btn-pause"  class="btn-hit" title="Pause"></div>
  <div id="btn-power"  class="btn-hit" title="Power"></div>
  <div id="btn-play"   class="btn-hit" title="Play"></div>
  <div id="btn-ffwd"   class="btn-hit" title="Fast Forward 10s"></div>

  <!-- LAYER 4: Status badge -->
  <div id="status">OFF</div>

</div>

<script>
/* ══════════════════════════════════════════════
   REFS & STATE
══════════════════════════════════════════════ */
const video     = document.getElementById('video');
const screenOff = document.getElementById('screen-off');
const statusEl  = document.getElementById('status');
const toast     = document.getElementById('toast');
const dragHint  = document.getElementById('drag-hint');
const widget    = document.getElementById('widget');

let powered    = false;
let toastTimer = null;

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1900);
}

/* ══════════════════════════════════════════════
   RIPPLE
══════════════════════════════════════════════ */
function spawnRipple(btn) {
  const dot = document.createElement('div');
  dot.className = 'ripple-dot';
  const br = btn.getBoundingClientRect();
  const wr = widget.getBoundingClientRect();
  dot.style.left = (br.left + br.width  / 2 - wr.left) + 'px';
  dot.style.top  = (br.top  + br.height / 2 - wr.top)  + 'px';
  widget.appendChild(dot);
  dot.addEventListener('animationend', () => dot.remove());
}

/* ══════════════════════════════════════════════
   POWER HELPERS
══════════════════════════════════════════════ */
function turnOn() {
  powered = true;
  screenOff.classList.add('hidden');
  statusEl.textContent = 'ON ▶';
}
function turnOff() {
  powered = false;
  video.pause();
  video.currentTime = 0;
  screenOff.classList.remove('hidden');
  statusEl.textContent = 'OFF';
}

/* ══════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════ */
document.getElementById('btn-power').addEventListener('click', function(e) {
  e.stopPropagation();
  spawnRipple(this);
  if (!powered) { turnOn(); video.play().catch(()=>{}); showToast('📺  TV ON'); }
  else          { turnOff(); showToast('📴  TV OFF'); }
});

document.getElementById('btn-play').addEventListener('click', function(e) {
  e.stopPropagation();
  spawnRipple(this);
  if (!powered) turnOn();
  video.play().catch(()=>{});
  statusEl.textContent = 'ON ▶';
  showToast('▶  PLAY');
});

document.getElementById('btn-pause').addEventListener('click', function(e) {
  e.stopPropagation();
  spawnRipple(this);
  if (!powered) { showToast('📴  TV is off'); return; }
  video.pause();
  statusEl.textContent = 'ON ⏸';
  showToast('⏸  PAUSE');
});

document.getElementById('btn-ffwd').addEventListener('click', function(e) {
  e.stopPropagation();
  spawnRipple(this);
  if (!powered) { showToast('📴  TV is off'); return; }
  video.currentTime = Math.min(video.currentTime + 10, video.duration || 0);
  showToast('⏩  +10s');
});

document.getElementById('btn-rewind').addEventListener('click', function(e) {
  e.stopPropagation();
  spawnRipple(this);
  if (!powered) { showToast('📴  TV is off'); return; }
  video.currentTime = Math.max(video.currentTime - 10, 0);
  showToast('⏪  −10s');
});

/* ══════════════════════════════════════════════
   DRAG
══════════════════════════════════════════════ */
let dragging = false, ox = 0, oy = 0;

widget.addEventListener('mousedown', startDrag);
widget.addEventListener('touchstart', startDragTouch, { passive: false });

function startDrag(e) {
  if (e.target.classList.contains('btn-hit')) return;
  dragging = true;
  const r = widget.getBoundingClientRect();
  ox = e.clientX - r.left;
  oy = e.clientY - r.top;
  widget.style.transition = 'none';
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', stopDrag);
}

function startDragTouch(e) {
  if (e.target.classList.contains('btn-hit')) return;
  dragging = true;
  const t = e.touches[0];
  const r = widget.getBoundingClientRect();
  ox = t.clientX - r.left;
  oy = t.clientY - r.top;
  widget.style.transition = 'none';
  document.addEventListener('touchmove', onDragTouch, { passive: false });
  document.addEventListener('touchend', stopDragTouch);
}

function moveTo(cx, cy) {
  hideDragHint();
  const nx = Math.max(0, Math.min(window.innerWidth  - widget.offsetWidth,  cx - ox));
  const ny = Math.max(0, Math.min(window.innerHeight - widget.offsetHeight, cy - oy));
  widget.style.left      = nx + 'px';
  widget.style.top       = ny + 'px';
  widget.style.transform = 'none';
}

function onDrag(e)      { if (dragging) moveTo(e.clientX, e.clientY); }
function onDragTouch(e) { if (dragging) { e.preventDefault(); moveTo(e.touches[0].clientX, e.touches[0].clientY); } }
function stopDrag()      { dragging = false; document.removeEventListener('mousemove', onDrag);      document.removeEventListener('mouseup',   stopDrag);      }
function stopDragTouch() { dragging = false; document.removeEventListener('touchmove', onDragTouch); document.removeEventListener('touchend',  stopDragTouch); }

/* ══════════════════════════════════════════════
   DRAG HINT — auto-hides after 4s
══════════════════════════════════════════════ */
let hintHidden = false;
function hideDragHint() {
  if (!hintHidden) { hintHidden = true; dragHint.classList.add('gone'); }
}
setTimeout(hideDragHint, 4000);
</script>
</body>
</html>
