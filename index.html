<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giraffe TV • Retro Widget</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            background: url('TV_Wallpaper.webp') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            font-family: 'Press Start 2P', system-ui;
            image-rendering: pixelated;
        }
        
        #tv-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 580px;
            height: 520px;
            transform: translate(-50%, -50%);
            cursor: grab;
            user-select: none;
            z-index: 100;
            filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.75));
        }
        
        #tv-frame {
            position: relative;
            width: 100%;
            height: 100%;
            background: url('TV_taust.png') no-repeat center center;
            background-size: contain;
        }
        
        #tv-screen {
            position: absolute;
            top: 142px;
            left: 105px;
            width: 375px;
            height: 238px;
            background: #000;
            border: 14px solid #1f1f1f;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 0 45px rgba(0,0,0,0.95),
                        0 0 20px rgba(0, 255, 80, 0.3);
        }
        
        #youtube-player {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 3px,
                rgba(0, 255, 120, 0.15) 3px,
                rgba(0, 255, 120, 0.15) 6px
            );
            pointer-events: none;
            z-index: 5;
            animation: scan 5s linear infinite;
        }
        
        @keyframes scan {
            0% { background-position: 0 0; }
            100% { background-position: 0 800px; }
        }
        
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 6;
        }
        
        #controls-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        
        .control-area {
            cursor: pointer;
            pointer-events: auto;
            transition: filter 0.1s;
        }
        
        .control-area:hover {
            filter: brightness(1.3);
        }
        
        .control-area:active {
            transform: scale(0.92);
        }
        
        .status {
            position: absolute;
            top: 88px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 20, 0, 0.85);
            color: #00ff80;
            padding: 6px 20px;
            font-size: 14px;
            border: 3px solid #00ff80;
            text-shadow: 0 0 10px #00ff80;
            z-index: 15;
            white-space: nowrap;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="tv-container">
        <div id="tv-frame">
            <!-- TV Screen -->
            <div id="tv-screen">
                <iframe 
                    id="youtube-player"
                    src="https://www.youtube.com/embed/mtg72V7qnjw?enablejsapi=1&controls=0&rel=0&modestbranding=1"
                    title="YouTube video player"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
                <div class="scanlines"></div>
                <div class="vignette"></div>
            </div>
            
            <!-- Status -->
            <div class="status" id="status">NOW PLAYING</div>
            
            <!-- SVG Controls -->
            <svg id="controls-svg" width="580" height="520" viewBox="0 0 511 547" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Power Button -->
                <rect x="235" y="415" width="48" height="48" fill="transparent" class="control-area" id="btn-power"/>
                
                <!-- Rewind -->
                <rect x="165" y="415" width="48" height="48" fill="transparent" class="control-area" id="btn-rewind"/>
                
                <!-- Pause -->
                <rect x="215" y="415" width="48" height="48" fill="transparent" class="control-area" id="btn-pause"/>
                
                <!-- Play -->
                <rect x="275" y="415" width="48" height="48" fill="transparent" class="control-area" id="btn-play"/>
                
                <!-- Fast Forward -->
                <rect x="335" y="415" width="48" height="48" fill="transparent" class="control-area" id="btn-ff"/>
            </svg>
        </div>
    </div>

    <script>
        // Draggable functionality
        const container = document.getElementById('tv-container');
        let isDragging = false;
        let currentX = 0, currentY = 0;
        let initialX = 0, initialY = 0;
        
        function dragStart(e) {
            if (e.target.closest('#tv-screen') || e.target.closest('.control-area')) return;
            
            initialX = e.clientX - currentX;
            initialY = e.clientY - currentY;
            isDragging = true;
            container.style.cursor = 'grabbing';
        }
        
        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();
            currentX = e.clientX - initialX;
            currentY = e.clientY - initialY;
            container.style.transform = `translate(${currentX}px, ${currentY}px)`;
        }
        
        function dragEnd() {
            isDragging = false;
            container.style.cursor = 'grab';
        }
        
        // YouTube Player
        let player;
        let isPowered = true;
        
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                events: {
                    'onReady': () => document.getElementById('status').textContent = "STANDBY",
                    'onStateChange': (e) => {
                        const statusEl = document.getElementById('status');
                        if (e.data === YT.PlayerState.PLAYING) statusEl.textContent = "NOW PLAYING";
                        else if (e.data === YT.PlayerState.PAUSED) statusEl.textContent = "PAUSED";
                    }
                }
            });
        }
        
        // Controls
        function setupControls() {
            const btnPower = document.getElementById('btn-power');
            const btnPlay = document.getElementById('btn-play');
            const btnPause = document.getElementById('btn-pause');
            const btnFF = document.getElementById('btn-ff');
            const btnRewind = document.getElementById('btn-rewind');
            
            btnPower.addEventListener('click', () => {
                isPowered = !isPowered;
                if (!isPowered) {
                    player.pauseVideo();
                    document.getElementById('status').textContent = "POWER OFF";
                } else {
                    document.getElementById('status').textContent = "NOW PLAYING";
                    player.playVideo();
                }
            });
            
            btnPlay.addEventListener('click', () => {
                if (player && isPowered) player.playVideo();
            });
            
            btnPause.addEventListener('click', () => {
                if (player && isPowered) player.pauseVideo();
            });
            
            btnFF.addEventListener('click', () => {
                if (player && isPowered) {
                    const time = player.getCurrentTime();
                    player.seekTo(time + 20);
                }
            });
            
            btnRewind.addEventListener('click', () => {
                if (player && isPowered) {
                    const time = player.getCurrentTime();
                    player.seekTo(Math.max(0, time - 20));
                }
            });
        }
        
        function loadYouTubeAPI() {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScript = document.getElementsByTagName('script')[0];
            firstScript.parentNode.insertBefore(tag, firstScript);
        }
        
        function init() {
            // Drag
            container.addEventListener('mousedown', dragStart);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', dragEnd);
            
            // Touch support
            container.addEventListener('touchstart', (e) => {
                if (e.target.closest('#tv-screen') || e.target.closest('.control-area')) return;
                const touch = e.touches[0];
                initialX = touch.clientX - currentX;
                initialY = touch.clientY - currentY;
                isDragging = true;
            });
            
            document.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const touch = e.touches[0];
                currentX = touch.clientX - initialX;
                currentY = touch.clientY - initialY;
                container.style.transform = `translate(${currentX}px, ${currentY}px)`;
            });
            
            document.addEventListener('touchend', () => isDragging = false);
            
            loadYouTubeAPI();
            setupControls();
            
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (!player) return;
                switch(e.key) {
                    case ' ': 
                        e.preventDefault();
                        if (player.getPlayerState() === 1) player.pauseVideo();
                        else player.playVideo();
                        break;
                    case 'ArrowRight': 
                        if (player) player.seekTo(player.getCurrentTime() + 15);
                        break;
                    case 'ArrowLeft': 
                        if (player) player.seekTo(player.getCurrentTime() - 15);
                        break;
                }
            });
        }
        
        window.onload = init;
    </script>
</body>
</html>
