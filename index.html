<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Giraffe TV</title>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    user-select: none;
    background: url('TV_Wallpaper.jpg') center/cover no-repeat fixed;
  }

  /* ── Draggable TV widget ── */
  #tv-widget {
    position: fixed;
    width: 480px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    cursor: grab;
    z-index: 10;
    filter: drop-shadow(0 24px 48px rgba(0,0,0,0.6));
    transition: filter 0.3s;
  }
  #tv-widget:active { cursor: grabbing; }
  #tv-widget.off {
    filter: drop-shadow(0 12px 24px rgba(0,0,0,0.5)) brightness(0.45) saturate(0.1);
  }

  /* The PNG skin sits behind everything */
  #tv-giraffe {
    width: 100%;
    height: auto;
    display: block;
    pointer-events: none;
  }

  /*
    Screen rect from SVG viewBox 511×547:
      x=112.5, y=248.3, width=266.2, height=161.4
      left   = 112.5 / 511 = 22.016%
      top    = 248.3 / 547 = 45.393%
      width  = 266.2 / 511 = 52.094%
      height = 161.4 / 547 = 29.505%
    Screen bottom = (248.3+161.4)/547 = 74.9% — sits cleanly above buttons at ~77%
  */
  #screen-wrap {
    position: absolute;
    left:   18.982%;
    top:    45.887%;
    width:  58.121%;
    height: 26.325%;
    overflow: hidden;
    border-radius: 4px;
    background: #000;
    pointer-events: none;
  }

  #tv-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Power-off overlay on the screen */
  #screen-off {
    position: absolute;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: opacity 0.4s;
  }
  #screen-off.hidden { opacity: 0; pointer-events: none; }
  #screen-off svg { width: 28px; opacity: 0.2; }

  /*
    Button hit areas — clickable divs positioned using SVG coordinate percentages.
    Button centres in SVG coords (viewBox 511×547):
      Power  : (249, 428)  → left=48.73%, top=78.25%
      Pause  : (218, 431)  → left=42.66%, top=78.79%
      Play   : (281, 430)  → left=54.99%, top=78.61%
      Rewind : (161, 422)  → left=31.51%, top=77.15%
      FF     : (343, 422)  → left=67.12%, top=77.15%
  */
  .btn {
    position: absolute;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    pointer-events: auto;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .btn:hover  { background: rgba(255,255,200,0.22); }
  .btn:active { background: rgba(255,255,200,0.42); }

  #btn-power { left: 48.728%; top: 78.245%; }
  #btn-pause { left: 42.661%; top: 78.793%; }
  #btn-play  { left: 54.990%; top: 78.611%; }
  #btn-rw    { left: 31.507%; top: 77.148%; }
  #btn-ff    { left: 67.123%; top: 77.148%; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(0,0,0,0.72);
    color: #fff;
    font: 13px/1 Georgia, serif;
    letter-spacing: .06em;
    padding: 8px 22px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    pointer-events: none;
    z-index: 99;
    backdrop-filter: blur(6px);
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Hint ── */
  #hint {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.45);
    color: rgba(255,255,255,.9);
    font: 12px/1 Georgia, serif;
    letter-spacing: .08em;
    padding: 6px 18px;
    border-radius: 16px;
    pointer-events: none;
    z-index: 99;
    backdrop-filter: blur(4px);
    animation: hintFade 5s ease forwards;
  }
  @keyframes hintFade {
    0%   { opacity:0; transform: translateX(-50%) translateY(-6px); }
    15%  { opacity:1; transform: translateX(-50%) translateY(0); }
    80%  { opacity:1; }
    100% { opacity:0; }
  }
</style>
</head>
<body>

<div id="tv-widget">

  <!-- 1) PNG skin (behind everything) -->
  <img id="tv-giraffe" src="TV_Taust.png" alt="" draggable="false"/>

  <!-- 2) Video screen — fits the grey rect in TV_Taust.png -->
  <div id="screen-wrap">
    <video id="tv-video" src="TV_Video.mp4" loop playsinline preload="auto"></video>
    <div id="screen-off">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v8"/><path d="M6.3 6.3A8 8 0 1 0 17.7 6.3"/>
      </svg>
    </div>
  </div>

  <!-- 3) Invisible button hit areas -->
  <div class="btn" id="btn-power" title="Power"></div>
  <div class="btn" id="btn-pause" title="Pause"></div>
  <div class="btn" id="btn-play"  title="Play"></div>
  <div class="btn" id="btn-rw"   title="Rewind 10s"></div>
  <div class="btn" id="btn-ff"   title="Fast-forward 10s"></div>

</div><!-- #tv-widget -->

<div id="toast"></div>
<div id="hint">🦒 Drag the TV anywhere &nbsp;·&nbsp; Click the buttons to control</div>

<script>
  const video     = document.getElementById('tv-video');
  const widget    = document.getElementById('tv-widget');
  const screenOff = document.getElementById('screen-off');
  let powered = false;
  let toastT  = null;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => t.classList.remove('show'), 1600);
  }

  function setPower(on) {
    powered = on;
    if (on) {
      widget.classList.remove('off');
      screenOff.classList.add('hidden');
      video.currentTime = 0;
      video.play().catch(()=>{});
      showToast('📺  ON');
    } else {
      widget.classList.add('off');
      screenOff.classList.remove('hidden');
      video.pause();
      video.currentTime = 0;
      showToast('📺  OFF');
    }
  }

  document.getElementById('btn-power').onclick = e => { e.stopPropagation(); setPower(!powered); };
  document.getElementById('btn-play').onclick   = e => { e.stopPropagation(); if (!powered) { setPower(true); return; } video.play().catch(()=>{}); showToast('▶  Play'); };
  document.getElementById('btn-pause').onclick  = e => { e.stopPropagation(); if (!powered) return; video.pause(); showToast('⏸  Pause'); };
  document.getElementById('btn-rw').onclick     = e => { e.stopPropagation(); if (!powered) return; video.currentTime = Math.max(0, video.currentTime - 10); showToast('⏮  −10s'); };
  document.getElementById('btn-ff').onclick     = e => { e.stopPropagation(); if (!powered) return; video.currentTime = Math.min(video.duration || Infinity, video.currentTime + 10); showToast('⏭  +10s'); };

  /* ── Drag ── */
  let dragging = false, ox = 0, oy = 0;
  widget.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('btn')) return;
    dragging = true;
    widget.setPointerCapture(e.pointerId);
    const r = widget.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
    widget.style.transition = 'none';
    widget.style.cursor = 'grabbing';
  });
  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    let x = Math.max(0, Math.min(window.innerWidth  - widget.offsetWidth,  e.clientX - ox));
    let y = Math.max(0, Math.min(window.innerHeight - widget.offsetHeight, e.clientY - oy));
    widget.style.left = x + 'px';
    widget.style.top  = y + 'px';
    widget.style.transform = 'none';
  });
  window.addEventListener('pointerup', () => { dragging = false; widget.style.cursor = 'grab'; });

  /* start in off state */
  widget.classList.add('off');
</script>
</body>
</html>
