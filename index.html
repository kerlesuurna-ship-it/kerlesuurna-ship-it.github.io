<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Giraffe TV</title>

<style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

/* FULL PAGE WALLPAPER */
body{
    background:url("website_Wallpaper.webp") center center / cover no-repeat;
}

/* TV CONTAINER */
#tvWidget{
    position:absolute;
    width:700px;
    max-width:90vw;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    user-select:none;
    cursor:grab;
}

/* TV SKIN */
#tvSkin{
    width:100%;
    display:block;
    pointer-events:none;
}

/* SCREEN POSITION */
#screen{
    position:absolute;
    left:21.8%;
    top:31%;
    width:52.8%;
    height:26.8%;
    overflow:hidden;
    border-radius:6px;
    background:#000;
}

/* YouTube iframe */
#player{
    width:100%;
    height:100%;
}

/* Screen off overlay */
#screenOff{
    position:absolute;
    inset:0;
    background:black;
    display:none;
    z-index:10;
}

/* Button hitboxes */
.button{
    position:absolute;
    cursor:pointer;
    z-index:20;
}

/* Previous */
#btnPrev{
    left:39.5%;
    top:76%;
    width:6%;
    height:5%;
}

/* Pause */
#btnPause{
    left:48%;
    top:79%;
    width:4%;
    height:4%;
}

/* Power */
#btnPower{
    left:55%;
    top:77%;
    width:5%;
    height:6%;
}

/* Play */
#btnPlay{
    left:63%;
    top:78%;
    width:5%;
    height:4%;
}

/* Next */
#btnNext{
    left:71%;
    top:76%;
    width:6%;
    height:5%;
}

.button:hover{
    background:rgba(255,255,255,.08);
    border-radius:50%;
}
</style>
</head>
<body>

<div id="tvWidget">

    <img id="tvSkin" src="TV_Taust.png" alt="TV">

    <div id="screen">
        <div id="player"></div>
        <div id="screenOff"></div>
    </div>

    <div id="btnPrev" class="button"></div>
    <div id="btnPause" class="button"></div>
    <div id="btnPower" class="button"></div>
    <div id="btnPlay" class="button"></div>
    <div id="btnNext" class="button"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/*************************************************
 YOUTUBE PLAYER
*************************************************/

let player;
let tvOn = true;

function onYouTubeIframeAPIReady(){

    player = new YT.Player('player',{
        videoId:'mtg72V7qnjw',
        playerVars:{
            autoplay:1,
            controls:0,
            rel:0,
            modestbranding:1,
            playsinline:1
        },
        events:{
            onReady:(e)=>{
                e.target.playVideo();
            }
        }
    });
}

/*************************************************
 BUTTONS
*************************************************/

const screenOff = document.getElementById("screenOff");

document.getElementById("btnPlay").addEventListener("click",()=>{

    if(!tvOn) return;

    player.playVideo();
});

document.getElementById("btnPause").addEventListener("click",()=>{

    if(!tvOn) return;

    const state = player.getPlayerState();

    if(state === 1){
        player.pauseVideo();
    }else{
        player.playVideo();
    }
});

document.getElementById("btnPower").addEventListener("click",()=>{

    tvOn = !tvOn;

    if(tvOn){

        screenOff.style.display="none";
        player.playVideo();

    }else{

        screenOff.style.display="block";
        player.pauseVideo();
    }
});

document.getElementById("btnPrev").addEventListener("click",()=>{

    if(!tvOn) return;

    player.seekTo(0,true);
});

document.getElementById("btnNext").addEventListener("click",()=>{

    if(!tvOn) return;

    player.seekTo(
        player.getCurrentTime()+30,
        true
    );
});

/*************************************************
 DRAGGABLE TV
*************************************************/

const widget = document.getElementById("tvWidget");

let dragging = false;
let offsetX = 0;
let offsetY = 0;

widget.addEventListener("pointerdown",(e)=>{

    dragging = true;

    widget.setPointerCapture(e.pointerId);

    const rect = widget.getBoundingClientRect();

    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

    widget.style.cursor = "grabbing";
});

window.addEventListener("pointermove",(e)=>{

    if(!dragging) return;

    widget.style.left =
        (e.clientX - offsetX) + "px";

    widget.style.top =
        (e.clientY - offsetY) + "px";

    widget.style.transform = "none";
});

window.addEventListener("pointerup",()=>{

    dragging = false;
    widget.style.cursor = "grab";
});

</script>

</body>
</html>
