<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Flower Field</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #dff7d8;
      height: 100vh;
      cursor: crosshair;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .title {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: #4b7a4b;
      font-size: 1.4rem;
      letter-spacing: 2px;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>

<div class="title">Move your mouse through the flowers ✿</div>

<canvas id="scene"></canvas>

<script>
const canvas = document.getElementById("scene");
const ctx = canvas.getContext("2d");

let w, h;
let mouse = {
  x: -9999,
  y: -9999
};

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener("mouseleave", () => {
  mouse.x = -9999;
  mouse.y = -9999;
});

class Flower {
  constructor(x, y, size) {
    this.baseX = x;
    this.baseY = y;

    this.x = x;
    this.y = y;

    this.size = size;

    this.angle = Math.random() * Math.PI * 2;
    this.rotation = 0;

    this.petals = 5 + Math.floor(Math.random() * 3);

    this.color = [
      "#ff8cc8",
      "#ffd166",
      "#ff9f9f",
      "#cdb4ff",
      "#ffffff"
    ][Math.floor(Math.random() * 5)];

    this.centerColor = "#ffcc33";

    this.floatOffset = Math.random() * 1000;
  }

  update(time) {
    // Gentle floating motion
    this.y = this.baseY + Math.sin(time * 0.001 + this.floatOffset) * 2;

    const dx = mouse.x - this.x;
    const dy = mouse.y - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // React to mouse
    if (dist < 120) {
      const force = (120 - dist) / 120;

      this.rotation += force * 0.15;

      this.x -= dx * force * 0.02;
      this.y -= dy * force * 0.02;
    } else {
      // Return smoothly
      this.x += (this.baseX - this.x) * 0.05;
      this.y += (this.baseY - this.y) * 0.05;
      this.rotation *= 0.95;
    }
  }

  draw() {
    ctx.save();

    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);

    // Stem
    ctx.strokeStyle = "#5b9b5b";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 10);
    ctx.lineTo(0, 30);
    ctx.stroke();

    // Petals
    for (let i = 0; i < this.petals; i++) {
      ctx.rotate((Math.PI * 2) / this.petals);

      ctx.fillStyle = this.color;

      ctx.beginPath();
      ctx.ellipse(
        0,
        this.size,
        this.size * 0.5,
        this.size,
        0,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    // Center
    ctx.fillStyle = this.centerColor;
    ctx.beginPath();
    ctx.arc(0, 0, this.size * 0.45, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

const flowers = [];

for (let i = 0; i < 120; i++) {
  flowers.push(
    new Flower(
      Math.random() * w,
      Math.random() * h,
      6 + Math.random() * 6
    )
  );
}

function animate(time) {
  ctx.clearRect(0, 0, w, h);

  // Soft background glow
  const gradient = ctx.createRadialGradient(
    w / 2,
    h / 2,
    100,
    w / 2,
    h / 2,
    w
  );

  gradient.addColorStop(0, "#e8ffe2");
  gradient.addColorStop(1, "#d7f5cf");

  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, w, h);

  flowers.forEach(flower => {
    flower.update(time);
    flower.draw();
  });

  requestAnimationFrame(animate);
}

animate(0);
</script>

</body>
</html>
