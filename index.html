<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Giraffe TV</title>
<link rel="icon" type="image/png" href="TV_Favicon.png"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {

  <div style="position:fixed;top:5%;left:5%;background:rgba(0,0,0,0.45);padding:12px 16px;border-radius:6px;font-family:Arial,sans-serif;color:white;font-size:10pt;line-height:1.7;z-index:9999;">
  <a href="http://saaremaa.edu.ee/loovkood-2026" style="color:white;text-decoration:none;display:block;margin-bottom:6px;">&larr; Tagasi</a>
  <div><strong>Projekti nimi:</strong> Kaelkirjaku telekas</div>
  <div><strong>Autorid:</strong> Kerle Suurna ja Kennerth Vahelaid</div>
  <div><strong>Juhendaja:</strong> Kristjan Kesküla</div>
  <div style="margin-top:6px;">Ruum &amp; Disain<br>Saaremaa Gümnaasium<br>2026</div>
</div>

    width: 100vw;
    height: 100vh;
    overflow: hidden;
    user-select: none;
    background: url('TV_Wallpaper.jpg') center/cover no-repeat fixed;
  }

  /* ── Draggable TV widget ── */
  #tv-widget {
    position: fixed;
    width: 480px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    filter: drop-shadow(0 24px 48px rgba(0,0,0,0.6));
    transition: filter 0.3s;
  }
  #tv-widget.off {
    filter: drop-shadow(0 12px 24px rgba(0,0,0,0.5)) brightness(0.45) saturate(0.1);
  }

  /* The PNG skin sits behind everything */
  #tv-giraffe {
    width: 100%;
    height: auto;
    display: block;
    pointer-events: none;
  }

  #screen-wrap {
    position: absolute;
    left:   23.0%;
    top:    46.618%;
    width:  51.755%;
    height: 23.766%;
    overflow: hidden;
    border-radius: 4px;
    background: #000;
    pointer-events: none;
  }

  #tv-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Power-off overlay on the screen */
  #screen-off {
    position: absolute;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: opacity 0.4s;
  }
  #screen-off.hidden { opacity: 0; pointer-events: none; }
  #screen-off svg { width: 28px; opacity: 0.2; }

  .btn {
    position: absolute;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    pointer-events: auto;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .btn:hover  { background: rgba(255,255,200,0.22); }
  .btn:active { background: rgba(255,255,200,0.42); }

  #btn-rw    { left: 27.10%; top: 73.51%; }
  #btn-pause { left: 40.63%; top: 75.41%; }
  #btn-power { left: 47.95%; top: 74.84%; }
  #btn-play  { left: 55.28%; top: 75.08%; }
  #btn-ff    { left: 69.57%; top: 73.46%; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(0,0,0,0.72);
    color: #fff;
    font: 13px/1 Georgia, serif;
    letter-spacing: .06em;
    padding: 8px 22px;
    border-radius: 20px;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    pointer-events: none;
    z-index: 99;
    backdrop-filter: blur(6px);
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Hint ── */
  #hint {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.45);
    color: rgba(255,255,255,.9);
    font: 12px/1 Georgia, serif;
    letter-spacing: .08em;
    padding: 6px 18px;
    border-radius: 16px;
    pointer-events: none;
    z-index: 99;
    backdrop-filter: blur(4px);
    animation: hintFade 5s ease forwards;
  }
  @keyframes hintFade {
    0%   { opacity:0; transform: translateX(-50%) translateY(-6px); }
    15%  { opacity:1; transform: translateX(-50%) translateY(0); }
    80%  { opacity:1; }
    100% { opacity:0; }
  }

  /* ── Mobile: 50% scale ── */
  @media (max-width: 600px) {
    #tv-widget {
      width: 240px; /* 480px × 0.5 */
    }
    .btn {
      width: 17px;  /* 34px × 0.5 */
      height: 17px;
    }
    #screen-off svg {
      width: 14px;  /* 28px × 0.5 */
    }
    #hint {
      font-size: 6px;    /* 12px × 0.5 */
      padding: 3px 9px;  /* 6px/18px × 0.5 */
      border-radius: 8px;
      white-space: nowrap;
    }
    #toast {
      font-size: 6.5px;  /* 13px × 0.5 */
      padding: 4px 11px; /* 8px/22px × 0.5 */
      border-radius: 10px;
      bottom: 13px;      /* 26px × 0.5 */
    }
  }
</style>
</head>
<body>

<div id="tv-widget">

  <!-- 1) PNG skin (behind everything) -->
  <img id="tv-giraffe" src="TV_Taust.png" alt="" draggable="false"/>

  <!-- 2) Video screen — fits the grey rect in TV_Taust.png -->
  <div id="screen-wrap">
    <video id="tv-video" src="TV_Video.mp4" loop playsinline preload="auto"></video>
    <div id="screen-off">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v8"/><path d="M6.3 6.3A8 8 0 1 0 17.7 6.3"/>
      </svg>
    </div>
  </div>

  <!-- 3) Invisible button hit areas -->
  <div class="btn" id="btn-power" title="Toide"></div>
  <div class="btn" id="btn-pause" title="Peata"></div>
  <div class="btn" id="btn-play"  title="Esita"></div>
  <div class="btn" id="btn-rw"   title="Keri tagasi 10s"></div>
  <div class="btn" id="btn-ff"   title="Keri edasi 10s"></div>

</div><!-- #tv-widget -->

<div id="toast"></div>
<div id="hint">🦒 Lohista telekat kuhu soovid &nbsp;·&nbsp; Vajuta nuppudele juhtimiseks</div>

<script>
  /* ── Custom cursor: scale to ≤128px and inject as data URL ── */
  (function() {
    const MAX = 128;
    // Original image dimensions and hotspot (adjust if your PNG is a different size)
    // Hotspot in the original image coords: 36, 27
    const HX_ORIG = 36, HY_ORIG = 27;
    const img = new Image();
    img.src = 'TV_Cursor.png';
    img.onload = function() {
      const w = img.naturalWidth, h = img.naturalHeight;
      const scale = Math.min(1, MAX / Math.max(w, h));
      const cw = Math.round(w * scale), ch = Math.round(h * scale);
      const hx = Math.round(HX_ORIG * scale), hy = Math.round(HY_ORIG * scale);
      const canvas = document.createElement('canvas');
      canvas.width = cw; canvas.height = ch;
      canvas.getContext('2d').drawImage(img, 0, 0, cw, ch);
      const dataURL = canvas.toDataURL('image/png');
      const rule = `url("${dataURL}") ${hx} ${hy}, auto`;
      // Inject a <style> that covers every element
      const style = document.createElement('style');
      style.textContent = `*, *::before, *::after { cursor: ${rule} !important; }`;
      document.head.appendChild(style);
    };
    img.onerror = function() {
      // PNG failed to load — nothing to do, browser default cursor is fine
      console.warn('TV_Cursor.png could not be loaded.');
    };
  })();

  const video     = document.getElementById('tv-video');
  const widget    = document.getElementById('tv-widget');
  const screenOff = document.getElementById('screen-off');
  let powered = false;
  let toastT  = null;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => t.classList.remove('show'), 1600);
  }

  function setPower(on) {
    powered = on;
    if (on) {
      widget.classList.remove('off');
      screenOff.classList.add('hidden');
      video.currentTime = 0;
      video.play().catch(()=>{});
      showToast('📺  Sees');
    } else {
      widget.classList.add('off');
      screenOff.classList.remove('hidden');
      video.pause();
      video.currentTime = 0;
      showToast('📺  Väljas');
    }
  }

  document.getElementById('btn-power').onclick = e => { e.stopPropagation(); setPower(!powered); };
  document.getElementById('btn-play').onclick   = e => { e.stopPropagation(); if (!powered) { setPower(true); return; } video.play().catch(()=>{}); showToast('▶  Esita'); };
  document.getElementById('btn-pause').onclick  = e => { e.stopPropagation(); if (!powered) return; video.pause(); showToast('⏸  Peata'); };
  document.getElementById('btn-rw').onclick     = e => { e.stopPropagation(); if (!powered) return; video.currentTime = Math.max(0, video.currentTime - 10); showToast('⏮  −10s'); };
  document.getElementById('btn-ff').onclick     = e => { e.stopPropagation(); if (!powered) return; video.currentTime = Math.min(video.duration || Infinity, video.currentTime + 10); showToast('⏭  +10s'); };

  /* ── Drag ── */
  let dragging = false, ox = 0, oy = 0;
  widget.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('btn')) return;
    dragging = true;
    widget.setPointerCapture(e.pointerId);
    const r = widget.getBoundingClientRect();
    ox = e.clientX - r.left;
    oy = e.clientY - r.top;
    widget.style.transition = 'none';
  });
  window.addEventListener('pointermove', e => {
    if (!dragging) return;
    let x = Math.max(0, Math.min(window.innerWidth  - widget.offsetWidth,  e.clientX - ox));
    let y = Math.max(0, Math.min(window.innerHeight - widget.offsetHeight, e.clientY - oy));
    widget.style.left = x + 'px';
    widget.style.top  = y + 'px';
    widget.style.transform = 'none';
  });
  window.addEventListener('pointerup', () => { dragging = false; });

  /* start in off state */
  widget.classList.add('off');

  /* mobile: swap hint text to touch-friendly wording */
  if (window.innerWidth <= 600) {
    document.getElementById('hint').textContent = '🦒 Lohista telekat · Vajuta nuppudele juhtimiseks';
  }
</script>
</body>
</html>
