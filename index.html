<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giraffe TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Georgia', serif;
      background: #1a1a1a;
    }

    /* ── Full-page background ── */
    #bg {
      position: fixed;
      inset: 0;
      background: url('TV_Wallpaper.jpg') center/cover no-repeat;
      z-index: 0;
    }

    /* ── Floating draggable widget ── */
    #widget {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 420px;
      /* keep aspect ratio of the PNG (511 × 547) */
      aspect-ratio: 511 / 547;
      z-index: 10;
      user-select: none;
      cursor: grab;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.6));
      transition: filter 0.2s;
    }
    #widget:active { cursor: grabbing; filter: drop-shadow(0 28px 80px rgba(0,0,0,0.8)); }

    /* ── Giraffe PNG skin ── */
    #skin {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Video element clipped to the screen rectangle ── */
    /*
      SVG viewBox: 0 0 511 547
      Screen rect in SVG coords: x=112.5 y=248.3 w=266.2 h=161.4
      As percentages of 511×547:
        left  = 112.5/511  = 22.01%
        top   = 248.3/547  = 45.39%
        width = 266.2/511  = 52.09%
        height= 161.4/547  = 29.50%
    */
    #screen-wrapper {
      position: absolute;
      left: 22.01%;
      top: 45.39%;
      width: 52.09%;
      height: 29.50%;
      z-index: 1;
      border-radius: 6px;
      overflow: hidden;
      background: #000;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Off-state overlay */
    #screen-off {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    #screen-off.visible { opacity: 1; pointer-events: auto; }
    #screen-off svg { width: 40%; opacity: 0.3; }

    /* ── Invisible hit-areas mapped over SVG button positions ── */
    /*
      Button centres in SVG coords (viewBox 511×547):

      REWIND    centre ~161, 422   → 31.5%, 77.1%    size ~22×18px → 4.3%×3.3%
      PAUSE     centre ~218, 431   → 42.7%, 78.8%    size ~16×14px → 3.1%×2.6%
      POWER     centre ~249, 429   → 48.7%, 78.4%    size ~16×16px → 3.1%×2.9%
      PLAY      centre ~281, 431   → 55.0%, 78.8%    size ~16×14px → 3.1%×2.6%
      FFWD      centre ~343, 422   → 67.1%, 77.1%    size ~22×18px → 4.3%×3.3%

      We make the hit areas generously larger for usability.
    */
    .btn-hit {
      position: absolute;
      z-index: 5;
      cursor: pointer;
      border-radius: 50%;
      /* debug: uncomment to visualise */
      /* background: rgba(255,0,0,0.3); */
    }

    #btn-rewind {
      left: 28%;
      top:  73%;
      width: 10%;
      height: 8%;
    }
    #btn-pause {
      left: 39%;
      top:  75%;
      width: 9%;
      height: 8%;
    }
    #btn-power {
      left: 45.5%;
      top:  75%;
      width: 9%;
      height: 8%;
    }
    #btn-play {
      left: 52%;
      top:  75%;
      width: 9%;
      height: 8%;
    }
    #btn-ffwd {
      left: 62%;
      top:  73%;
      width: 10%;
      height: 8%;
    }

    /* ── Button press ripple ── */
    @keyframes ripple {
      0%   { transform: translate(-50%,-50%) scale(0);   opacity: .6; }
      100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0;  }
    }
    .ripple-dot {
      position: absolute;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
      pointer-events: none;
      animation: ripple 0.4s ease-out forwards;
      z-index: 20;
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 6px 16px;
      border-radius: 20px;
      letter-spacing: 0.08em;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
      backdrop-filter: blur(6px);
    }
    #tooltip.show { opacity: 1; }

    /* ── Status badge ── */
    #status {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 9px;
      font-family: 'Courier New', monospace;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.45);
      padding: 2px 7px;
      border-radius: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 6;
      pointer-events: none;
    }

    /* ── Drag hint ── */
    #drag-hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.55);
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      pointer-events: none;
      z-index: 50;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      transition: opacity 1s;
    }
    #drag-hint.hidden { opacity: 0; }
  </style>
</head>
<body>

<!-- Background -->
<div id="bg"></div>

<!-- Drag hint -->
<div id="drag-hint">☞ DRAG THE GIRAFFE</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Widget -->
<div id="widget">

  <!-- Status badge -->
  <div id="status">OFF</div>

  <!-- Video screen -->
  <div id="screen-wrapper">
    <video id="video" src="Giraffe_4k_Video__1_.mp4" loop playsinline preload="metadata"></video>
    <div id="screen-off" class="visible">
      <!-- simple power icon -->
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 20 V50" stroke="#aaa" stroke-width="6" stroke-linecap="round"/>
        <path d="M35 28 A28 28 0 1 0 65 28" stroke="#aaa" stroke-width="6" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
  </div>

  <!-- Giraffe PNG on top -->
  <img id="skin" src="TV_Taust.png" alt="Giraffe TV" draggable="false" />

  <!-- Hit areas -->
  <div id="btn-rewind" class="btn-hit" title="Rewind"></div>
  <div id="btn-pause"  class="btn-hit" title="Pause"></div>
  <div id="btn-power"  class="btn-hit" title="Power"></div>
  <div id="btn-play"   class="btn-hit" title="Play"></div>
  <div id="btn-ffwd"   class="btn-hit" title="Fast Forward"></div>

</div>

<script>
  /* ════════════════════════════════════════
     STATE
  ════════════════════════════════════════ */
  const video      = document.getElementById('video');
  const screenOff  = document.getElementById('screen-off');
  const statusEl   = document.getElementById('status');
  const tooltip    = document.getElementById('tooltip');
  const dragHint   = document.getElementById('drag-hint');
  const widget     = document.getElementById('widget');

  let powered = false;
  let tooltipTimer = null;

  /* ════════════════════════════════════════
     TOOLTIP
  ════════════════════════════════════════ */
  function showTooltip(msg) {
    tooltip.textContent = msg;
    tooltip.classList.add('show');
    clearTimeout(tooltipTimer);
    tooltipTimer = setTimeout(() => tooltip.classList.remove('show'), 1800);
  }

  /* ════════════════════════════════════════
     RIPPLE
  ════════════════════════════════════════ */
  function spawnRipple(btn) {
    const dot = document.createElement('div');
    dot.className = 'ripple-dot';
    const r = btn.getBoundingClientRect();
    const wr = widget.getBoundingClientRect();
    dot.style.left = (r.left + r.width/2  - wr.left) + 'px';
    dot.style.top  = (r.top  + r.height/2 - wr.top)  + 'px';
    widget.appendChild(dot);
    dot.addEventListener('animationend', () => dot.remove());
  }

  /* ════════════════════════════════════════
     STATUS BADGE
  ════════════════════════════════════════ */
  function updateStatus(text) {
    statusEl.textContent = text;
  }

  /* ════════════════════════════════════════
     POWER
  ════════════════════════════════════════ */
  document.getElementById('btn-power').addEventListener('click', function(e) {
    e.stopPropagation();
    spawnRipple(this);
    if (!powered) {
      powered = true;
      screenOff.classList.remove('visible');
      video.play().catch(()=>{});
      updateStatus('ON ▶');
      showTooltip('📺  TV ON');
    } else {
      powered = false;
      video.pause();
      video.currentTime = 0;
      screenOff.classList.add('visible');
      updateStatus('OFF');
      showTooltip('📴  TV OFF');
    }
  });

  /* ════════════════════════════════════════
     PLAY
  ════════════════════════════════════════ */
  document.getElementById('btn-play').addEventListener('click', function(e) {
    e.stopPropagation();
    spawnRipple(this);
    if (!powered) {
      powered = true;
      screenOff.classList.remove('visible');
      updateStatus('ON ▶');
      showTooltip('▶  PLAY');
    } else {
      showTooltip('▶  PLAY');
      updateStatus('ON ▶');
    }
    video.play().catch(()=>{});
  });

  /* ════════════════════════════════════════
     PAUSE
  ════════════════════════════════════════ */
  document.getElementById('btn-pause').addEventListener('click', function(e) {
    e.stopPropagation();
    spawnRipple(this);
    if (powered) {
      video.pause();
      updateStatus('ON ⏸');
      showTooltip('⏸  PAUSE');
    } else {
      showTooltip('📴  TV is off');
    }
  });

  /* ════════════════════════════════════════
     FAST FORWARD (+10 s)
  ════════════════════════════════════════ */
  document.getElementById('btn-ffwd').addEventListener('click', function(e) {
    e.stopPropagation();
    spawnRipple(this);
    if (powered) {
      video.currentTime = Math.min(video.currentTime + 10, video.duration || 0);
      showTooltip('⏩  +10s');
    } else {
      showTooltip('📴  TV is off');
    }
  });

  /* ════════════════════════════════════════
     REWIND (-10 s)
  ════════════════════════════════════════ */
  document.getElementById('btn-rewind').addEventListener('click', function(e) {
    e.stopPropagation();
    spawnRipple(this);
    if (powered) {
      video.currentTime = Math.max(video.currentTime - 10, 0);
      showTooltip('⏪  -10s');
    } else {
      showTooltip('📴  TV is off');
    }
  });

  /* ════════════════════════════════════════
     DRAG
  ════════════════════════════════════════ */
  let dragging = false;
  let dragOX = 0, dragOY = 0;
  let hasDragged = false;

  widget.addEventListener('mousedown', startDrag);
  widget.addEventListener('touchstart', startDragTouch, { passive: false });

  function startDrag(e) {
    if (e.target.classList.contains('btn-hit')) return;
    dragging = true;
    const r = widget.getBoundingClientRect();
    dragOX = e.clientX - r.left;
    dragOY = e.clientY - r.top;
    widget.style.transition = 'none';
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
  }

  function startDragTouch(e) {
    if (e.target.classList.contains('btn-hit')) return;
    dragging = true;
    const touch = e.touches[0];
    const r = widget.getBoundingClientRect();
    dragOX = touch.clientX - r.left;
    dragOY = touch.clientY - r.top;
    widget.style.transition = 'none';
    document.addEventListener('touchmove', onDragTouch, { passive: false });
    document.addEventListener('touchend', stopDragTouch);
  }

  function onDrag(e) {
    if (!dragging) return;
    moveTo(e.clientX, e.clientY);
  }

  function onDragTouch(e) {
    if (!dragging) return;
    e.preventDefault();
    const touch = e.touches[0];
    moveTo(touch.clientX, touch.clientY);
  }

  function moveTo(cx, cy) {
    hasDragged = true;
    hideDragHint();
    const w = widget.offsetWidth;
    const h = widget.offsetHeight;
    let nx = cx - dragOX;
    let ny = cy - dragOY;
    // clamp to viewport
    nx = Math.max(0, Math.min(window.innerWidth  - w, nx));
    ny = Math.max(0, Math.min(window.innerHeight - h, ny));
    widget.style.left      = nx + 'px';
    widget.style.top       = ny + 'px';
    widget.style.transform = 'none';
  }

  function stopDrag() {
    dragging = false;
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup',   stopDrag);
  }

  function stopDragTouch() {
    dragging = false;
    document.removeEventListener('touchmove', onDragTouch);
    document.removeEventListener('touchend',  stopDragTouch);
  }

  /* ════════════════════════════════════════
     DRAG HINT
  ════════════════════════════════════════ */
  function hideDragHint() {
    dragHint.classList.add('hidden');
  }
  // hide hint after 4 s automatically
  setTimeout(hideDragHint, 4000);

</script>
</body>
</html>
